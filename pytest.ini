[pytest]
testpaths = tests
pythonpath = .
addopts = -q
markers =
    integration: testy integracyjne (moduły / sieć / wolniejsze)
    slow: bardzo wolne (np. pełne retry z prawdziwym sleep)
    regression: testy regresji (krytyczne zachowania modułów)
    e2e: testy end-to-end (pełne ścieżki / wiele modułów)
