name: Automatyczne Aplikowanie - Pipeline

permissions:
  contents: read
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Uruchamia się codziennie o 7:00 rano (UTC = 9:00 czasu polskiego)
    - cron: '0 7 * * 1-5'   # Poniedziałek - Piątek

  workflow_dispatch:          # Możliwość ręcznego uruchomienia z GitHub UI
    inputs:
      dry_run:
        description: 'Dry-run (nie wysyłaj emaili, tylko generuj)'
        required: false
        default: 'false'
        type: boolean
      resume:
        description: 'Wznów od checkpointu'
        required: false
        default: 'false'
        type: boolean
 
jobs:
  pipeline:
    name: Uruchom pipeline aplikowania
    runs-on: ubuntu-latest
    timeout-minutes: 60
 
    steps:
      # 1. Pobierz kod
      - name: Checkout repozytorium
        uses: actions/checkout@v6

      # 2. Ustaw Python
      - name: Ustaw Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt
 
      # 3. Zainstaluj zależności
      - name: Zainstaluj zależności
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
 
      # 4. Uruchom pipeline
      - name: Uruchom pipeline
        env:
          SERPAPI_API_KEY:   ${{ secrets.SERPAPI_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASS:         ${{ secrets.SMTP_PASS }}
          CV_DRIVE_ID:       ${{ secrets.CV_DRIVE_ID }}
          PIPELINE_DRY_RUN:  ${{ github.event.inputs.dry_run || 'false' }}
          PIPELINE_RESUME:   ${{ github.event.inputs.resume || 'false' }}
          LOG_LEVEL:         INFO
        run: |
          python main.py
 
      # 5. Zapisz raport Excel jako artefakt (nawet jeśli pipeline się nie powiódł)
      - name: Zapisz raport Excel
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: raport-aplikowania-${{ github.run_id }}
          path: output/
          retention-days: 30
          if-no-files-found: ignore

      # 6. Zapisz logi jako artefakt
      - name: Zapisz logi
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: logi-${{ github.run_id }}
          path: output/*.log
          retention-days: 14
          if-no-files-found: ignore