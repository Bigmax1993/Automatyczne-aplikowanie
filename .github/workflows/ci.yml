name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Pip check
        run: pip check

      - name: Składnia (compileall — cały projekt .py)
        run: |
          python -m compileall -q -f \
            main.py config.py Serp_limit.py serp_client.py webdriver_apply.py \
            rate_limit.py reporter.py scheduler.py mailer.py cv_engine.py cv_finalizer.py \
            scripts/
